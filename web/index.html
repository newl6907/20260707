<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>로또 추첨기 — 디자인 반영 UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <h1 class="hero-title">로또 추첨기</h1>
    <p class="hero-sub">자동으로 로또 번호를 추첨합니다</p>
  </header>

  <main class="container">
    <section class="controls">
      <label class="label">생성 개수</label>
      <input id="count" type="number" min="1" max="20" value="1" />

      <label class="label">시드 (선택)</label>
      <input id="seed" type="text" placeholder="정수 입력하면 재현 가능" />

      <div class="actions">
        <button id="generate" class="btn-primary">번호 생성</button>
        <button id="copy" class="btn-secondary">복사</button>
      </div>
    </section>

    <section id="results" class="results" aria-live="polite"></section>
    <section id="history" class="results" aria-live="polite">
      <h2 class="hero-sub">역대 당첨번호 (최근 8주)</h2>
      <div id="history-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
